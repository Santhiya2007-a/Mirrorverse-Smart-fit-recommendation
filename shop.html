<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | Mirrorverse App</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .inner-header {
            background-color: var(--color-primary);
            padding: var(--space-sm) 0;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: var(--space-md);
            color: white;
        }

        .results-bar {
            background: white;
            padding: 8px var(--space-md);
            border-bottom: 1px solid var(--color-border);
            font-size: 14px;
            font-weight: 500;
            color: #565959;
        }
    </style>
</head>

<body>

    <!-- App Header (Amazon Inspired) -->
    <header class="app-header">
        <div class="container">
            <div class="header-top">
                <a href="index.html" class="flex items-center" style="color:white;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                </a>
                <div class="search-container">
                    <input type="text" class="search-input" id="search-input-home" placeholder="Search Mirrorverse">
                    <div class="search-btn" id="search-btn-home">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                    </div>
                </div>
                <div class="header-actions">
                    <a href="cart.html" class="icon-link">
                        <span class="badge-count" id="header-cart-count">0</span>
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
                            <line x1="3" y1="6" x2="21" y2="6"></line>
                        </svg>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <!-- Results bar -->
    <div class="results-bar">
        <span id="results-count">40</span> RESULTS
    </div>

    <!-- Category Filter Ribbon -->
    <div class="category-ribbon" style="background: white; border-top: none;">
        <a href="shop.html?cat=all" class="category-item">
            <div class="category-icon" style="font-size: 16px; font-weight: 700;">ALL</div>
            <span class="category-label">All</span>
        </a>
        <a href="shop.html?cat=Blazer" class="category-item">
            <div class="category-icon">🧥</div>
            <span class="category-label">Blazer</span>
        </a>
        <a href="shop.html?cat=Pencil" class="category-item">
            <div class="category-icon">👗</div>
            <span class="category-label">Pencil</span>
        </a>
        <a href="shop.html?cat=Sheath" class="category-item">
            <div class="category-icon">👔</div>
            <span class="category-label">Sheath</span>
        </a>
        <a href="shop.html?cat=Wrap" class="category-item">
            <div class="category-icon">🎀</div>
            <span class="category-label">Wrap</span>
        </a>
        <a href="shop.html?cat=Maxi" class="category-item">
            <div class="category-icon">💃</div>
            <span class="category-label">Maxi</span>
        </a>
    </div>

    <!-- Main Content -->
    <main class="container" style="padding-top: var(--space-lg); padding-bottom: var(--space-xxl);">
        <div id="all-products-grid" class="product-grid">
            <!-- Products injected by main.js -->
            <div class="skeleton" style="height: 350px;"></div>
            <div class="skeleton" style="height: 350px;"></div>
            <div class="skeleton" style="height: 350px;"></div>
            <div class="skeleton" style="height: 350px;"></div>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            <span>Home</span>
        </a>
        <a href="shop.html" class="nav-item active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
            <span>Shop</span>
        </a>
        <a href="smart-fit.html" class="nav-item">
            <div style="background: var(--color-accent); border-radius: 50%; padding: 4px; display: flex;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    style="width: 24px; height: 24px;">
                    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                    <circle cx="12" cy="13" r="4"></circle>
                </svg>
            </div>
            <span>Smart Fit</span>
        </a>
        <a href="cart.html" class="nav-item">
            <div style="position: relative;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                </svg>
                <span class="badge-count" id="bot-cart-count" style="top: -8px; right: -8px;">0</span>
            </div>
            <span>Cart</span>
        </a>
        <a href="profile.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <span>Profile</span>
        </a>
    </nav>

    <script src="js/main.js"></script>
    <script>
        // Search handling (remains in shop.html for the header search bar)
        const searchInput = document.getElementById('search-input-home');
        const searchBtn = document.getElementById('search-btn-home');

        const handleSearch = () => {
            const q = searchInput.value;
            if (q) window.location.href = `shop.html?search=${encodeURIComponent(q)}`;
        };

        searchBtn.addEventListener('click', handleSearch);
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSearch();
        });
    </script>
</body>

</html>
