<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Mirrorverse Quick Access</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            background-color: white;
            padding: var(--space-md);
            font-family: inherit;
        }

        .login-container {
            max-width: 350px;
            margin: 0 auto;
        }

        .amazon-logo {
            text-align: center;
            padding: 20px 0;
            font-size: 24px;
            font-weight: 700;
            color: var(--color-primary);
        }

        .auth-card {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .auth-title {
            font-size: 28px;
            font-weight: 400;
            margin-bottom: 18px;
        }

        .auth-label {
            display: block;
            font-weight: 700;
            font-size: 13px;
            margin-bottom: 4px;
        }

        .auth-input {
            width: 100%;
            padding: 8px;
            border: 1px solid #a6a6a6;
            border-radius: 3px;
            margin-bottom: 14px;
            outline: none;
            transition: box-shadow 0.1s linear;
        }

        .auth-input:focus {
            border-color: #e77600;
            box-shadow: 0 0 3px 2px rgba(228, 121, 17, .5);
        }

        .btn-amazon-primary {
            width: 100%;
            background: linear-gradient(to bottom, #f7dfa1, #f0c14b);
            border: 1px solid #a88734;
            border-radius: 3px;
            padding: 8px;
            font-size: 13px;
            cursor: pointer;
            box-shadow: 0 1px 0 rgba(255, 255, 255, .4) inset;
        }

        .btn-amazon-secondary {
            width: 100%;
            background: linear-gradient(to bottom, #f7f8fa, #e7e9ec);
            border: 1px solid #adb1b8;
            border-radius: 3px;
            padding: 8px;
            font-size: 13px;
            cursor: pointer;
            box-shadow: 0 1px 0 rgba(255, 255, 255, .6) inset;
        }

        .legal-text {
            font-size: 11px;
            line-height: 1.5;
            color: #555;
            margin-bottom: 20px;
        }

        .legal-text a {
            color: #0066c0;
            text-decoration: none;
        }

        .new-to-amazon {
            position: relative;
            text-align: center;
            margin-bottom: 12px;
        }

        .new-to-amazon::before {
            content: "";
            width: 100%;
            height: 1px;
            background: #e7e7e7;
            position: absolute;
            top: 50%;
            left: 0;
            z-index: 1;
        }

        .new-to-amazon span {
            background: white;
            padding: 0 8px;
            font-size: 12px;
            color: #767676;
            position: relative;
            z-index: 2;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <div class="amazon-logo">Mirrorverse</div>

        <div class="auth-card">
            <h1 class="auth-title">Sign in</h1>
            <form onsubmit="handleLogin(event)">
                <label class="auth-label">Email or mobile phone number</label>
                <input type="text" class="auth-input" id="email" required>

                <label class="auth-label">Password</label>
                <input type="password" class="auth-input" id="password" required>

                <button type="submit" class="btn-amazon-primary">Continue</button>
            </form>

            <p class="legal-text" style="margin-top: 18px;">
                By continuing, you agree to Mirrorverse's <a href="#">Conditions of Use</a> and <a href="#">Privacy
                    Notice</a>.
            </p>

            <details style="font-size: 13px; color: #0066c0; margin-bottom: 10px;">
                <summary style="cursor: pointer;">Need help?</summary>
                <p style="padding-top: 5px; color: #555;">Forgot your password? <br> Other issues with Sign-In</p>
            </details>
        </div>

        <div class="new-to-amazon">
            <span>New to Mirrorverse?</span>
        </div>

        <button class="btn-amazon-secondary" onclick="alert('Proceeding to registration...')">Create your Mirrorverse
            account</button>

        <div style="text-align: center; margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px;">
            <div style="font-size: 11px; color: #555; display: flex; justify-content: center; gap: 15px;">
                <a href="#" style="color: #0066c0; text-decoration: none;">Conditions of Use</a>
                <a href="#" style="color: #0066c0; text-decoration: none;">Privacy Notice</a>
                <a href="#" style="color: #0066c0; text-decoration: none;">Help</a>
            </div>
            <p style="font-size: 11px; color: #555; margin-top: 10px;">© 2026 Mirrorverse.com, Inc. or its affiliates
            </p>
        </div>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault();
            // Mock login logic - redirect to the new profile page
            window.location.href = 'profile.html';
        }
    </script>
</body>

</html>
