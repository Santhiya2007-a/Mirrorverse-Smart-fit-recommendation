<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Smart Body Scan | Mirrorverse</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Google MediaPipe CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"
        crossorigin="anonymous"></script>
</head>

<body style="background: #111; color: white;">
    <header id="main-header"></header>

    <main class="container">
        <div style="text-align: center; margin: 2rem 0;">
            <h1 style="font-size: 2.5rem;">AI Body Scan</h1>
            <p style="color: #aaa;">Align yourself with the guide for 100% accurate sizing.</p>
        </div>

        <div class="smart-fit-camera">
            <video id="input_video" style="display: none;"></video>
            <canvas id="output_canvas" width="600" height="800" style="display: block; width: 100%;"></canvas>

            <!-- Scanning Animation Overlay -->
            <div id="scan-hud"
                style="position: absolute; top: 0; left:0; width: 100%; height: 100%; pointer-events: none;">
                <div class="hud-target"
                    style="border: 1px solid rgba(255,153,0,0.5); width: 60%; height: 80%; margin: 10% auto; border-radius: 40px; position: relative;">
                    <div class="hud-scanner"
                        style="position: absolute; width: 100%; height: 2px; background: #FF9900; animation: scanMove 2.5s infinite linear; box-shadow: 0 0 20px #FF9900;">
                    </div>
                </div>
            </div>
        </div>

        <div style="text-align: center; margin-top: 2rem;">
            <p id="scan-status" style="margin-bottom: 1rem;">Initializing AI engine...</p>
            <button id="capture-btn" class="btn btn-secondary"
                style="display: inline-block; width: auto; padding: 1.5rem 4rem; font-size: 1.2rem;">CALCULATE ELITE
                SIZE</button>
        </div>

        <!-- Result Modal (Hidden by default) -->
        <div id="result-overlay"
            style="display: none; position: fixed; bottom: 0; left:0; width:100%; background: white; color: black; padding: 3rem; border-radius: 30px 30px 0 0; box-shadow: 0 -20px 60px rgba(0,0,0,0.5); z-index: 2000;">
            <div class="container" style="text-align: center;">
                <h2 style="font-size: 2rem; margin-bottom: 1rem;">Detection Successful</h2>
                <div id="final-stats"
                    style="display: flex; justify-content: space-around; margin: 2rem 0; font-weight: 700;">
                    <!-- Data here -->
                </div>
                <div id="recommended-size-box"
                    style="margin: 2rem 0; padding: 2rem; background: #EAEDED; border-radius: 15px;">
                    <h1 style="font-size: 4rem; color: #111;">YOUR SIZE: <span id="size-result"
                            style="color: var(--amazon-accent);">--</span></h1>
                </div>
                <a id="shop-cta" href="#" class="btn btn-secondary" style="padding: 1.5rem 3rem;">REVEAL MY PERSONAL
                    COLLECTION</a>
            </div>
        </div>
    </main>

    <style>
        @keyframes scanMove {
            0% {
                top: 0;
            }

            100% {
                top: 100%;
            }
        }
    </style>

    <script type="module" src="js/smartfit.js"></script>
    <script type="module" src="js/main.js"></script>
</body>

</html>
