<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mirrorverse Size Mastery</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body style="background: white;">
    <header id="main-header"></header>
    <main class="container">
        <h1>Official AI Size Guide</h1>
        <div style="margin-top: 2rem;">
            <h2>Women's Standard Chart (cm)</h2>
            <table style="width: 100%; border-collapse: collapse; margin-top: 1rem;">
                <tr style="background: #eee;">
                    <th style="padding: 10px; border: 1px solid #ddd;">Size</th>
                    <th style="padding: 10px; border: 1px solid #ddd;">Chest</th>
                </tr>
                <tr>
                    <td style="padding: 10px; border: 1px solid #ddd;">Small (S)</td>
                    <td style="padding: 10px; border: 1px solid #ddd;">86 - 90</td>
                </tr>
                <tr>
                    <td style="padding: 10px; border: 1px solid #ddd;">Medium (M)</td>
                    <td style="padding: 10px; border: 1px solid #ddd;">90 - 94</td>
                </tr>
                <tr>
                    <td style="padding: 10px; border: 1px solid #ddd;">Large (L)</td>
                    <td style="padding: 10px; border: 1px solid #ddd;">94 - 100</td>
                </tr>
            </table>

            <h2 style="margin-top: 3rem;">Men's Standard Chart (cm)</h2>
            <table style="width: 100%; border-collapse: collapse; margin-top: 1rem;">
                <tr style="background: #eee;">
                    <th style="padding: 10px; border: 1px solid #ddd;">Size</th>
                    <th style="padding: 10px; border: 1px solid #ddd;">Chest</th>
                </tr>
                <tr>
                    <td style="padding: 10px; border: 1px solid #ddd;">Small (S)</td>
                    <td style="padding: 10px; border: 1px solid #ddd;">88 - 92</td>
                </tr>
                <tr>
                    <td style="padding: 10px; border: 1px solid #ddd;">Medium (M)</td>
                    <td style="padding: 10px; border: 1px solid #ddd;">92 - 98</td>
                </tr>
                <tr>
                    <td style="padding: 10px; border: 1px solid #ddd;">Large (L)</td>
                    <td style="padding: 10px; border: 1px solid #ddd;">98 - 104</td>
                </tr>
            </table>
        </div>
    </main>
    <footer id="main-footer"></footer>
    <script type="module" src="js/main.js"></script>
</body>

</html>
