<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mirrorverse Secure Login</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body style="background: white;">
    <div style="text-align: center; padding: 3rem 0;">
        <h1 style="font-size: 2.5rem; letter-spacing: -2px;">Mirrorverse<span
                style="color:var(--amazon-accent);">.</span></h1>
    </div>

    <main class="container" style="max-width: 400px; padding: 2rem; border: 1px solid #ddd; border-radius: 8px;">
        <h1 style="margin-bottom: 1rem; font-size: 1.8rem; font-weight: 500;">Sign in</h1>
        <div style="margin-bottom: 20px;">
            <label style="font-weight: 700; font-size: 0.9rem;">Email (phone for mobile accounts)</label>
            <input type="text"
                style="width: 100%; padding: 10px; border: 1px solid #aaa; border-radius: 4px; margin-top: 5px;">
        </div>
        <div style="margin-bottom: 20px;">
            <label style="font-weight: 700; font-size: 0.9rem;">Password</label>
            <input type="password"
                style="width: 100%; padding: 10px; border: 1px solid #aaa; border-radius: 4px; margin-top: 5px;">
        </div>
        <button class="btn btn-primary" onclick="window.location.href='index.html'" style="padding: 1rem;">Continue to
            Elite Access</button>
        <p style="font-size: 0.8rem; margin-top: 2rem; color: #555;">By continuing, you agree to Mirrorverse's
            Conditions of Use and Privacy Notice.</p>
    </main>

    <div style="text-align: center; margin-top: 2rem; color: #777;">
        ---------- New to Mirrorverse? ----------
    </div>
    <div style="max-width: 400px; margin: 1rem auto;">
        <button class="btn btn-outline"
            style="border: 1px solid #ddd; padding: 1rem; width: 100%; border-radius: 4px;">Create your Elite
            account</button>
    </div>
</body>

</html>
