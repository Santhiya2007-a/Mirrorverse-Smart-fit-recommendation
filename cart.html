<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart | Mirrorverse App</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .inner-header {
            background-color: var(--color-primary);
            padding: var(--space-sm) 0;
            color: white;
            display: flex;
            align-items: center;
        }

        .cart-subtotal-box {
            background: white;
            padding: var(--space-md);
            border-bottom: 1px solid var(--color-border);
            margin-bottom: var(--space-md);
        }

        .btn-checkout-amazon {
            background: #FFD814;
            color: #0F1111;
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-weight: 500;
            border: 1px solid #FCD200;
            margin-top: 12px;
            cursor: pointer;
        }

        .cart-item-amazon {
            background: white;
            padding: var(--space-md);
            border-bottom: 1px solid var(--color-border);
            display: flex;
            gap: var(--space-md);
        }

        .cart-item-img {
            width: 100px;
            height: 120px;
            object-fit: cover;
            border-radius: 4px;
        }
    </style>
</head>

<body>

    <!-- App Header (Amazon Inspired) -->
    <header class="app-header">
        <div class="container">
            <div class="header-top">
                <a href="index.html" class="flex items-center" style="color:white;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                </a>
                <h1 style="font-size: 18px; color: white; margin-left: 12px; font-weight: 500;">Shopping Cart</h1>
                <div style="flex: 1;"></div>
                <div class="header-actions">
                    <a href="profile.html" class="icon-link">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container" style="padding: 0; padding-bottom: 120px; background: #eaeded; min-height: 100vh;">
        <div id="cart-content">
            <div style="padding: 40px; text-align: center;">
                <p>Loading your cart...</p>
            </div>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            <span>Home</span>
        </a>
        <a href="shop.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
            <span>Shop</span>
        </a>
        <a href="smart-fit.html" class="nav-item">
            <div style="background: var(--color-accent); border-radius: 50%; padding: 4px; display: flex;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    style="width: 24px; height: 24px;">
                    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                    <circle cx="12" cy="13" r="4"></circle>
                </svg>
            </div>
            <span>Smart Fit</span>
        </a>
        <a href="cart.html" class="nav-item active">
            <div style="position: relative;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                </svg>
                <span class="badge-count" id="bot-cart-count" style="top: -8px; right: -8px;">0</span>
            </div>
            <span>Cart</span>
        </a>
        <a href="profile.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <span>Profile</span>
        </a>
    </nav>

    <script src="js/main.js"></script>
    <script src="js/cart.js"></script>
</body>

</html>
</body>

</html>
